openapi: 3.0.0
info:
  title: XPM Public API
  description: Xero Practice Manager Public API v3.1
  termsOfService: https://developer.xero.com/xero-developer-platform-terms-conditions/
  contact:
    name: Xero Platform Team
    url: https://developer.xero.com
    email: api@xero.com
  version: v3.1
servers:
  - url: https://api.xero.com/practicemanager/
    description: Xero Practice Manager API
paths:
  /v3.1/category.api/list:
    get:
      tags:
        - CategoryV31
      summary: Return a list of all categories
      operationId: CategoryV31_List
      parameters:
        - name: Xero-Features
          in: header
          description: Comma-separated feature flags. Include 'practice-strict-content-type' to enable strict Accept/Content-Type negotiation.
          schema:
            type: string
        - name: fields
          in: query
          description: Comma-separated list of fields to include in the response. When omitted, all fields are returned.
          schema:
            type: string
      responses:
        "200":
          description: The request was successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponseDto'
        "500":
          description: An unexpected error occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseErrorDto'
      security:
        - OAuth2:
            - practicemanager
            - practicemanager.read
  /v3.1/client.api/list:
